replicaCount: 1

image:
  repository: ghcr.io/iamay0bami/realworld-app
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# Security context — enforced by Kyverno policy
securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

serviceAccount:
  create: true
  name: "realworld-app"

# Environment variables injected from Kubernetes secrets
# The secrets themselves are created by External Secrets Operator from Vault
env:
  jwtSecret:
    secretName: realworld-secrets
    secretKey: jwt-secret
  dbUrl:
    secretName: realworld-secrets
    secretKey: db-url
